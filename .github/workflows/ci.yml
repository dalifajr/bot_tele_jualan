name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall src

      - name: Copy smoke
        env:
          PYTHONPATH: src
        run: python ops/qa_copy_smoke.py

      - name: Local E2E
        env:
          PYTHONPATH: src
        run: python ops/e2e_local_test.py

  perf-listener-gate:
    runs-on: ubuntu-latest
    needs: smoke-and-e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Listener performance smoke gate
        env:
          PYTHONPATH: src
          PERF_SMOKE_REQUESTS: "120"
          PERF_SMOKE_WARMUP: "20"
          PERF_SMOKE_P95_MS: "400"
        run: python ops/perf_listener_smoke.py